name: pkg-pr-new
on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - run: pnpm ci

      - run: pnpm build

      - run: pnpm dlx pkg-pr-new publish --bin --packageManager=npm,pnpm,yarn,bun