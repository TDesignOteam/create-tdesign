name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - run: pnpm ci

      - run: pnpm build

      - name: test templates
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const dirs = fs.readdirSync('templates');
            execSync('mkdir tests && cd tests', { stdio: 'inherit' });
            dirs.forEach(name => {
              execSync(`node ../dist/index.js ${name} --template ${name}`, { stdio: 'inherit', cwd: 'tests' });
            });
            execSync('pnpm -r install', { stdio: 'inherit', cwd: 'tests' });
            execSync('pnpm -r build', { stdio: 'inherit', cwd: 'tests' });
