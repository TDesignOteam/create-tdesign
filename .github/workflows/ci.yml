name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  vue:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm ci
      - run: pnpm build
      - name: test templates
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const dirs = fs.readdirSync('templates').filter(d => d.startsWith('vue-') && !d.includes('-chat-') && !d.startsWith('mobile-'));
            execSync('mkdir tests && cd tests', { stdio: 'inherit' });
            dirs.forEach(name => {
              execSync(`node ../dist/index.js ${name} --template ${name}`, { stdio: 'inherit', cwd: 'tests' });
            });
            execSync('pnpm -r --if-present install', { stdio: 'inherit', cwd: 'tests' });
            execSync('pnpm -r --if-present  build', { stdio: 'inherit', cwd: 'tests' });

