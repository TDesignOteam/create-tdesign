name: ci
on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - run: pnpm ci

      - run: pnpm build

      - name: test templates
        run: |
          mkdir tests && cd tests
          for dir in ../templates/*; do
            name=$(basename "$dir")
            node ../dist/index.js "$name" --template "$name"
          done
          pnpm -r install
          pnpm -r build
